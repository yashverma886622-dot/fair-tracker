<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – FairTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #f472b6 0%, #8b5cf6 100%);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .gradient-btn {
    background: linear-gradient(135deg, #f472b6 0%, #8b5cf6 100%);
    transition: all 0.3s ease;
}

.gradient-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(139, 92, 246, 0.3);
}
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-6">

<div class="glass-card w-full max-w-md p-10 rounded-3xl">

    <div class="text-center mb-8">
        <div class="w-12 h-12 bg-gradient-to-br from-pink-500 to-purple-600 rounded-xl flex items-center justify-center mx-auto mb-4">
            <i data-lucide="layers" class="text-white"></i>
        </div>
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-zinc-400">Enter your details to access the dashboard</p>
    </div>

    <!-- REAL FLASK FORM -->
    <form method="POST" action="{{ url_for('login') }}" class="space-y-5">

        <div>
            <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">
                Full Name
            </label>
            <input 
                type="text"
                name="name"
                required
                class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition"
            >
        </div>

        <div>
            <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">
                Password
            </label>
            <input 
                type="password"
                name="password"
                required
                class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition"
            >
        </div>

        <div class="grid grid-cols-2 gap-4">

            <!-- ROLE -->
            <div>
                <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">
                    Role
                </label>
                <select 
                    id="role-select"
                    name="role"
                    onchange="toggleTeam()"
                    class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-3 focus:outline-none transition"
                >
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <!-- TEAM (Dynamic from DB) -->
            <div id="team-container">
                <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">
                    Team
                </label>
                <select 
                    name="team_id"
                    class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-3 focus:outline-none transition"
                >
                    {% for team in teams %}
                        <option value="{{ team.id }}">{{ team.name }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <button 
            type="submit"
            class="gradient-btn w-full py-4 rounded-xl font-bold text-white mt-4"
        >
            Sign In
        </button>
    </form>

    <div class="text-center mt-6">
        <a href="{{ url_for('landing') }}" class="text-sm text-zinc-500 hover:text-white transition">
            Back to Home
        </a>
    </div>

</div>

<script>
    lucide.createIcons();

    function toggleTeam() {
        const role = document.getElementById("role-select").value;
        const teamContainer = document.getElementById("team-container");

        if (role === "teacher") {
            teamContainer.style.display = "none";
        } else {
            teamContainer.style.display = "block";
        }
    }

    toggleTeam(); // Run on load
</script>

</body>
</html>
